services:
  db:
    image: postgres:17
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - app-db-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
    restart: always
    env_file: .env
    environment:
      - TZ=Asia/Shanghai
      - POSTGRES_SERVER=db  # 强制覆盖 .env 中的 IP，确保指向 db 服务
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    # 生产环境不需要暴露 8000 给宿主机，仅供 Nginx 内部访问
    expose:
      - "8000"
    command: >
      bash -c "
        bash /app/scripts/prestart.sh && 
        fastapi run --workers 4 app/main.py --host 0.0.0.0 --port 8000
      "

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        - VITE_API_URL=/
    restart: always
    depends_on:
      - backend
    networks:
      - app-network
    ports:
      - "80:80" # 唯一的公网入口
    # 这里的 volumes 挂载是可选的，如果你想修改 nginx.conf 不重新 build 镜像，可以保留：
    # volumes:
    #   - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  app-db-data:

networks:
  app-network:
    driver: bridge